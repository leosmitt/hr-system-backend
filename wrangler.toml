name = "hr-system-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database
# အသုံးပြုသူအနေဖြင့် 'npx wrangler d1 create hr-system-db' command ဖြင့် database အရင်ဆောက်ရပါမည်။
[[d1_databases]]
binding = "DB"
database_name = "hr-system-db"
database_id = "your-database-id-here" # npx wrangler d1 create မှရလာသော ID ကို ဤနေရာတွင်ထည့်ပါ

# KV for sessions
# အသုံးပြုသူအနေဖြင့် 'npx wrangler kv:namespace create SESSIONS' command ဖြင့် KV အရင်ဆောက်ရပါမည်။
[[kv_namespaces]]
binding = "SESSIONS"
id = "your-kv-id-here" # npx wrangler kv:namespace create မှရလာသော ID ကို ဤနေရာတွင်ထည့်ပါ

# Environment variables
[vars]
JWT_SECRET = "REPLACE_WITH_A_SECURE_RANDOM_STRING"
JWT_EXPIRE = "7d"
ENVIRONMENT = "production"

# Production settings
[env.production]
vars = { ENVIRONMENT = "production" }
